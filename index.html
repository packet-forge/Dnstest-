<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Test | Sentinel Diagnostics</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
            --blue: #58a6ff; --green: #238636; --red: #da3633; --yellow: #d29922; --gray: #8b949e;
        }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; line-height: 1.5; }
        h1 { color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px;}
        .module { background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 15px; }
        .config-panel { border-color: var(--blue); background-color: #0d1117; margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 1rem; color: var(--blue); text-transform: uppercase; }
        .status { font-family: monospace; font-weight: bold; padding: 4px 10px; border-radius: 4px; display: inline-block; font-size: 0.85rem; text-transform: uppercase; }
        .loading { background-color: var(--yellow); color: #000; }
        .pass { background-color: var(--green); color: #fff; }
        .fail { background-color: var(--red); color: #fff; }
        .offline { background-color: #30363d; color: var(--text); }
        .data-readout { background-color: #010409; padding: 12px; border-radius: 6px; color: #a5d6ff; margin-top: 12px; font-size: 0.8rem; font-family: 'Courier New', Courier, monospace; border: 1px solid #222; white-space: pre-wrap; line-height: 1.6; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
        label { cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--blue); }
        .btn-container { text-align: center; margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        button { background-color: #21262d; color: var(--blue); border: 1px solid var(--border); padding: 14px 32px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 200px; text-transform: uppercase; letter-spacing: 1px;}
        button:hover { background-color: #30363d; border-color: var(--gray); }
    </style>
</head>
<body>

    <h1>DNS Test <span style="font-size: 0.6rem; opacity: 0.5;">v2.0</span></h1>

    <div class="module config-panel">
        <h2>Target Pipeline Rules</h2>
        <div class="controls">
            <label><input type="checkbox" id="expect-dnssec" checked onchange="refreshView()"> DNSSEC (Unbound)</label>
            <label><input type="checkbox" id="expect-sinkhole" checked onchange="refreshView()"> Sinkhole (AdGuard)</label>
            <label><input type="checkbox" id="expect-routing" checked onchange="refreshView()"> CDN Routing (Latency)</label>
            <label><input type="checkbox" id="expect-crypt" checked onchange="refreshView()"> Encryption (DNSCrypt)</label>
            <label><input type="checkbox" id="strict-mode" checked> Strict Validation</label>
        </div>
    </div>

    <div class="module" id="mod-dnssec">
        <h2>1. DNSSEC Validation</h2>
        <div id="dnssec-status" class="status loading">IDLE</div>
        <div id="dnssec-data" class="data-readout">Waiting for audit...</div>
    </div>

    <div class="module" id="mod-sinkhole">
        <h2>2. AdGuard Sinkhole</h2>
        <div id="sinkhole-status" class="status loading">IDLE</div>
        <div id="sinkhole-data" class="data-readout">Waiting for audit...</div>
    </div>

    <div class="module" id="mod-routing">
        <h2>3. CDN Routing & Latency</h2>
        <div id="routing-status" class="status loading">IDLE</div>
        <div id="routing-data" class="data-readout">Waiting for audit...</div>
    </div>

    <div class="module" id="mod-crypt">
        <h2>4. DNSCrypt Tunnel</h2>
        <div id="crypt-status" class="status loading">IDLE</div>
        <div id="crypt-data" class="data-readout">Waiting for audit...</div>
    </div>

    <div class="module" id="mod-meta">
        <h2>5. Pipeline Metadata</h2>
        <div id="meta-status" class="status loading">IDLE</div>
        <div id="meta-data" class="data-readout">Network details...</div>
    </div>

    <div class="btn-container">
        <button onclick="runAllTests()">Retry Test</button>
        <button onclick="exportReport()" style="background-color: #1f6feb; color: #fff; border-color: #388bfd;">Export Logs</button>
    </div>

    <script>
        const networkMap = { 
            "45873": "Reliance Jio", "55836": "Reliance Jio", "131259": "Kerala Vision", 
            "133201": "Asianet", "13335": "Cloudflare", "19281": "Quad9", 
            "15169": "Google", "34939": "NextDNS", "134149": "AdGuard DNS", "36692": "OpenDNS" 
        };

        function refreshView() {
            ['dnssec', 'sinkhole', 'routing', 'crypt'].forEach(id => {
                document.getElementById(`mod-${id}`).style.display = document.getElementById(`expect-${id}`).checked ? 'block' : 'none';
            });
        }

        const setUI = (id, text, className, dataText) => {
            const status = document.getElementById(`${id}-status`);
            const data = document.getElementById(`${id}-data`);
            if (status) { status.textContent = text; status.className = `status ${className}`; }
            if (data && dataText) data.textContent = dataText;
        };

        async function checkConnectivity() {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 6000);
            try {
                return await Promise.any([
                    fetch('https://connectivitycheck.gstatic.com/generate_204', { mode: 'no-cors', signal: controller.signal }),
                    fetch('https://cp.cloudflare.com/generate_204', { mode: 'no-cors', signal: controller.signal })
                ]).then(() => true);
            } catch (e) { return false; }
        }

        async function runAllTests() {
            if (!(await checkConnectivity())) {
                ['dnssec', 'sinkhole', 'routing', 'crypt', 'meta'].forEach(id => setUI(id, 'OFFLINE', 'offline', "OFFLINE: Gateway unreachable."));
                return;
            }

            // 1. DNSSEC
            if (document.getElementById('expect-dnssec').checked) {
                setUI('dnssec', 'PROBING...', 'loading', "Querying signature servers...");
                const domains = ['dnssec-failed.org', 'dns-servfail.net', 'badisig.go6lab.si'];
                let log = "Target Signature Analysis:\n--------------------------\n";
                const results = await Promise.all(domains.map(async (d) => {
                    const blocked = await new Promise(res => {
                        const img = new Image();
                        img.onload = () => res(false); img.onerror = () => res(true);
                        img.src = `http://${d}/favicon.ico?${Date.now()}`;
                        setTimeout(() => res(true), 4000);
                    });
                    log += `[${blocked ? 'SECURE' : 'LEAK  '}] ${d}\n`;
                    return blocked;
                }));
                const passed = document.getElementById('strict-mode').checked ? results.every(r => r) : results.some(r => r);
                setUI('dnssec', passed ? 'PASS' : 'FAIL', passed ? 'pass' : 'fail', log);
            }

            // 2. SINKHOLE
            if (document.getElementById('expect-sinkhole').checked) {
                setUI('sinkhole', 'PROBING...', 'loading', "Injecting tracker payloads...");
                const trackers = [
                    { url: 'google-analytics.com/analytics.js', name: 'Google Analytics' },
                    { url: 'doubleclick.net/favicon.ico', name: 'DoubleClick Ads ' },
                    { url: 'connect.facebook.net/en_US/fbevents.js', name: 'Facebook Pixel  ' }
                ];
                let log = "Payload Intercept Analysis:\n---------------------------\n";
                const results = await Promise.all(trackers.map(async (t) => {
                    const blocked = await fetch(`https://www.${t.url}`, { mode: 'no-cors' }).then(() => false).catch(() => true);
                    log += `[${blocked ? 'SINKHOLED' : 'RESOLVED '}] ${t.name}\n`;
                    return blocked;
                }));
                const passed = document.getElementById('strict-mode').checked ? results.every(r => r) : results.some(r => r);
                setUI('sinkhole', passed ? 'PASS' : 'FAIL', passed ? 'pass' : 'fail', log);
            }

            // 3. LATENCY
            if (document.getElementById('expect-routing').checked) {
                setUI('routing', 'MEASURING...', 'loading', "Pinging global edge networks...");
                let log = "Edge Node Latency Analysis:\n---------------------------\n";
                try {
                    const measure = async (url, name) => {
                        const start = performance.now();
                        await fetch(url, { mode: 'no-cors', cache: 'no-store' });
                        const rtt = Math.round(performance.now() - start);
                        log += `[${rtt.toString().padStart(4, ' ')}ms] ${name}\n`;
                        return rtt;
                    };
                    const cfTime = await measure('https://cp.cloudflare.com/generate_204', 'Cloudflare CDN');
                    const ggTime = await measure('https://connectivitycheck.gstatic.com/generate_204', 'Google Edge   ');
                    
                    if (cfTime > 200 || ggTime > 200) {
                        log += `\n[FAIL] Severe Latency detected in pipeline. Check ISP routing.`;
                        setUI('routing', 'FAIL', 'fail', log);
                    } else {
                        log += `\n[OK] Optimal regional routing.`;
                        setUI('routing', 'PASS', 'pass', log);
                    }
                } catch(e) { setUI('routing', 'ERROR', 'fail', 'Failed to measure edge latency.'); }
            }

            // 4 & 5. CRYPT & META
            setUI('crypt', 'AUDITING...', 'loading', "Tracing packet routing...");
            setUI('meta', 'QUERYING...', 'loading', "Requesting ASN records...");
            
            let isp = "Unknown", myASN = "0", resolverASN = "0", resolverName = "Unknown";
            let metaError = "";

            try {
                const ipData = await fetch('https://ipwho.is/').then(r => r.json());
                if(ipData.success) { isp = ipData.connection.isp; myASN = String(ipData.connection.asn); }
                else throw new Error();
            } catch (e) {
                try {
                    const backup = await fetch('https://ipapi.co/json/').then(r => r.json());
                    isp = backup.org; myASN = String(backup.asn).replace(/\D/g, '');
                } catch (err) { isp = "Shielded"; myASN = "0"; metaError = "Lookup Rate-Limited."; }
            }

            try {
                const dnsData = await fetch('https://edns.ip-api.com/json').then(r => r.json());
                resolverASN = String(dnsData.dns.asn);
                const cleanResASN = resolverASN.replace(/\D/g, '');
                resolverName = networkMap[cleanResASN] || dnsData.dns.geo || `IP: ${dnsData.dns.ip}`;
            } catch (e) { resolverName = "Encrypted Tunnel"; }

            // Metadata UI
            let metaLog = "Edge Node Information:\n----------------------\n";
            metaLog += `Public IP Owner : ${isp}\n`;
            metaLog += `Gateway ASN     : AS${myASN.replace(/\D/g, '')}`;
            setUI('meta', metaError ? 'WARN' : 'CONNECTED', metaError ? 'loading' : 'pass', metaError || metaLog);
            
            // DNSCrypt UI (The API Name-Matching Fix)
            if (document.getElementById('expect-crypt').checked) {
                const exitNodeLower = resolverName.toLowerCase();
                const ispKeyword = isp.split(' ')[0].toLowerCase();
                
                // If exit node belongs to a known secure provider, it passes.
                const knownTunnels = ['cloudflare', 'quad9', 'google', 'nextdns', 'adguard', 'cisco'];
                let isEncrypted = knownTunnels.some(t => exitNodeLower.includes(t));
                
                // If the exit node name explicitly matches your local ISP, it's a leak.
                if (exitNodeLower.includes(ispKeyword) && ispKeyword.length > 2) {
                    isEncrypted = false;
                }

                let cryptLog = "Routing Telemetry:\n------------------\n";
                cryptLog += `Entry Node : ${isp}\n`;
                cryptLog += `Exit Node  : ${resolverName}\n`;
                cryptLog += `Status     : ${isEncrypted ? 'Tunnel Active' : 'ISP Leak Detected'}`;
                setUI('crypt', isEncrypted ? 'PASS' : 'FAIL', isEncrypted ? 'pass' : 'fail', cryptLog);
            }
        }

        function exportReport() {
            let report = "DNS TEST | SENTINEL DIAGNOSTICS REPORT\n" + "=".repeat(38) + "\n\n";
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            report += `Timestamp : ${timestamp}\n\n`;

            ['dnssec', 'sinkhole', 'routing', 'crypt', 'meta'].forEach(id => {
                const mod = document.getElementById(`mod-${id}`);
                const statusBtn = document.getElementById(`${id}-status`);
                const dataBox = document.getElementById(`${id}-data`);
                if (mod && mod.style.display !== 'none') {
                    const title = mod.querySelector('h2').innerText;
                    report += `${title} [${statusBtn.innerText}]\n`;
                    report += "-".repeat(title.length + statusBtn.innerText.length + 3) + "\n";
                    report += dataBox.innerText.trim() + "\n\n";
                }
            });

            navigator.clipboard.writeText(report).then(() => {
                const btn = document.querySelector('button[onclick="exportReport()"]');
                const old = btn.innerText;
                btn.innerText = "COPIED!"; btn.style.backgroundColor = "#238636";
                setTimeout(() => { btn.innerText = old; btn.style.backgroundColor = "#1f6feb"; }, 2000);
            });
        }

        refreshView(); runAllTests();
    </script>
</body>
</html>
