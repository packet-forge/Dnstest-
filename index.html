    <title>Sentinel Node | Pipeline Diagnostics</title>

        :root {
            --bg: #0d1117;
            --card: #161b22;

            --text: #c9d1d9;

            --green: #238636;

            --yellow: #d29922;
            --gray: #8b949e;
        }
        body { 
            background-color: var(--bg); color: var(--text);

            padding: 20px; max-width: 650px; margin: 0 auto; line-height: 1.6;

            transition: all 0.3s ease;
        }
        .config-panel { border-color: var(--gray); background-color: var(--bg); padding: 15px;}

        p { font-size: 0.85rem; margin: 5px 0 15px 0; color: var(--gray); }
        .status { font-family: monospace; font-weight: bold; padding: 5px 12px; border-radius: 4px; display: inline-block; font-size: 0.95rem; }
        .loading { background-color: var(--yellow); color: #000; }
