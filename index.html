<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Node | Pipeline Diagnostics</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
            --blue: #58a6ff; --green: #238636; --red: #da3633; --yellow: #d29922; --gray: #8b949e;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 650px; margin: 0 auto; }
        h1 { color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .module { background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.1rem; color: var(--blue); letter-spacing: 1px; }
        p { font-size: 0.85rem; margin: 5px 0 15px 0; color: var(--gray); }
        .status { font-family: monospace; font-weight: bold; padding: 5px 12px; border-radius: 4px; display: inline-block; font-size: 0.95rem; }
        .loading { background-color: var(--yellow); color: #000; }
        .pass { background-color: var(--green); color: #fff; }
        .fail { background-color: var(--red); color: #fff; }
        .offline { background-color: #30363d; color: var(--text); }
        .data-readout { background-color: #010409; padding: 12px; border-radius: 6px; color: #a5d6ff; margin-top: 12px; font-size: 0.85rem; font-family: 'Courier New', monospace; border: 1px solid #222; }
        .btn-container { text-align: center; margin-top: 30px; }
        button { background-color: #21262d; color: var(--blue); border: 1px solid var(--border); padding: 12px 28px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Sentinel Diagnostics</h1>

    <div class="module" id="mod-dnssec">
        <h2>1. DNSSEC (Unbound)</h2>
        <div id="dnssec-status" class="status loading">PENDING...</div>
        <div id="dnssec-data" class="data-readout">Waiting for connectivity...</div>
    </div>

    <div class="module" id="mod-sinkhole">
        <h2>2. Sinkhole (AdGuard)</h2>
        <div id="sinkhole-status" class="status loading">PENDING...</div>
        <div id="sinkhole-data" class="data-readout">Waiting for connectivity...</div>
    </div>

    <div class="module" id="mod-dnscrypt">
        <h2>3. Encryption (DNSCrypt)</h2>
        <div id="dnscrypt-status" class="status loading">PENDING...</div>
        <div id="dnscrypt-data" class="data-readout">Waiting for connectivity...</div>
    </div>

    <div class="module">
        <h2>4. Upstream Metadata</h2>
        <div id="provider-status" class="status loading">PENDING...</div>
        <div id="provider-data" class="data-readout">Checking ISP and Resolver...</div>
    </div>

    <div class="btn-container">
        <button onclick="runAllTests()">RE-SCAN PIPELINE</button>
    </div>

    <script>
        const networkMap = { "45873": "Reliance Jio", "9829": "BSNL", "131259": "Kerala Vision", "133201": "Asianet", "13335": "Cloudflare", "19281": "Quad9", "15169": "Google", "36692": "OpenDNS" };

        const setUI = (id, text, className, dataText) => {
            const status = document.getElementById(`${id}-status`);
            const data = document.getElementById(`${id}-data`);
            if (status) { status.textContent = text; status.className = `status ${className}`; }
            if (data && dataText) data.textContent = dataText;
        };

        async function checkConnectivity() {
            try {
                const res = await fetch('https://www.cloudflare.com/cdn-cgi/trace', { cache: 'no-store' });
                return res.ok;
            } catch (e) { return false; }
        }

        async function runAllTests() {
            setUI('dnssec', 'TESTING...', 'loading', null);
            setUI('sinkhole', 'TESTING...', 'loading', null);
            setUI('dnscrypt', 'AUDITING...', 'loading', null);
            setUI('provider', 'QUERYING...', 'loading', null);

            const isOnline = await checkConnectivity();
            if (!isOnline) {
                const msg = "OFFLINE: Check your internet connection.";
                setUI('dnssec', 'OFFLINE', 'offline', msg);
                setUI('sinkhole', 'OFFLINE', 'offline', msg);
                setUI('dnscrypt', 'OFFLINE', 'offline', msg);
                setUI('provider', 'OFFLINE', 'offline', msg);
                return;
            }

            // 1. DNSSEC Test (Checks for block of bad signatures)
            const img = new Image();
            img.onload = () => setUI('dnssec', 'FAIL', 'fail', 'Vulnerable! Resolved an invalid signature.');
            img.onerror = () => setUI('dnssec', 'PASS', 'pass', 'Verified. Unbound blocked the invalid signature.');
            img.src = "http://dnssec-failed.org/logo.png?" + Date.now();

            // 2. Sinkhole Test (Checks for block of trackers)
            fetch('https://www.google-analytics.com/analytics.js', { mode: 'no-cors' })
                .then(() => setUI('sinkhole', 'FAIL', 'fail', 'Leak! AdGuard is not blocking trackers.'))
                .catch(() => setUI('sinkhole', 'PASS', 'pass', 'Secure. Tracker intercepted at the DNS level.'));

            // 3. DNSCrypt & Provider Test
            try {
                const ipRes = await fetch('https://ipwho.is/').then(r => r.json());
                const dnsRes = await fetch('https://edns.ip-api.com/json').then(r => r.json());
                
                const isp = ipRes.connection.isp || "Unknown";
                const resolver = networkMap[dnsRes.dns.asn] || dnsRes.dns.geo || dnsRes.dns.ip;

                // DNSCrypt is considered PASS if the resolver is NOT the ISP
                const cryptPass = !resolver.toLowerCase().includes(isp.split(' ')[0].toLowerCase());
                
                if (cryptPass) setUI('dnscrypt', 'PASS', 'pass', `Encrypted. Tunneling through ${resolver}.`);
                else setUI('dnscrypt', 'FAIL', 'fail', `Leaking! Your ISP (${isp}) is resolving your DNS.`);

                setUI('provider', 'CONNECTED', 'pass', null);
                document.getElementById('provider-data').innerHTML = `<strong>ISP:</strong> ${isp}<br><strong>Resolver:</strong> ${resolver}`;
            } catch (e) {
                setUI('dnscrypt', 'ERROR', 'fail', 'Could not verify encryption tunnel.');
                setUI('provider', 'ERROR', 'fail', 'Metadata fetch failed.');
            }
        }

        runAllTests();
    </script>
</body>
</html>
